PACKAGE_NAME="logitech-trueforce"
PACKAGE_VERSION="@PKGVER@"
# Build against the `source` symlink DKMS always creates
# (-> /usr/src/$PACKAGE_NAME-$PACKAGE_VERSION). The `build` subdir DKMS
# also exposes is not guaranteed to be populated with the source files,
# which produced silent no-op builds where `dkms install` reported
# success but kept the old .ko (upstream issue #17).
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/source modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/source clean"
# The built object is hid-logitech-hidpp.ko regardless of the DKMS
# package name; it replaces the in-tree module of the same name via the
# /updates/dkms precedence depmod gives that directory (no blacklist
# needed). dkms passes LLVM=1 automatically on clang-built kernels.
BUILT_MODULE_NAME[0]="hid-logitech-trueforce"
BUILT_MODULE_LOCATION[0]="../source"
DEST_MODULE_NAME[0]="hid-logitech-trueforce"
DEST_MODULE_LOCATION[0]="/updates/dkms"
AUTOINSTALL="yes"
