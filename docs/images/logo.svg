<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- logi-dd: direct-drive wheel control for Linux.
       Original artwork: open-top racing rim with the 10-segment
       rev-light arc (the feature this project brought to Linux).
       No vendor trademarks. GPL-2.0-only, same as the project. -->
  <rect x="14" y="14" width="484" height="484" rx="104" fill="#17191d"/>
  <rect x="14" y="14" width="484" height="484" rx="104" fill="none" stroke="#2c3038" stroke-width="3"/>

  <!-- rim: side grips + lower bar -->
  <rect x="84"  y="186" width="74" height="196" rx="37" fill="#4b525d"/>
  <rect x="354" y="186" width="74" height="196" rx="37" fill="#4b525d"/>
  <rect x="118" y="322" width="276" height="60" rx="30" fill="#4b525d"/>

  <!-- center hub -->
  <rect x="178" y="212" width="156" height="130" rx="22" fill="#262a30"/>
  <!-- hub screen with a telemetry accent -->
  <rect x="206" y="238" width="100" height="46" rx="8" fill="#0d0f12"/>
  <rect x="216" y="272" width="56" height="5" rx="2.5" fill="#35c4f0"/>
  <!-- hub buttons hint -->
  <circle cx="222" cy="312" r="8" fill="#4b525d"/>
  <circle cx="256" cy="312" r="8" fill="#4b525d"/>
  <circle cx="290" cy="312" r="8" fill="#4b525d"/>

  <!-- rev-light arc -->
  <rect x="124.7" y="154.9" width="21.5" height="15" rx="5" fill="#2fd05a"/>
  <rect x="151.4" y="148.9" width="21.5" height="15" rx="5" fill="#2fd05a"/>
  <rect x="178.2" y="143.9" width="21.5" height="15" rx="5" fill="#2fd05a"/>
  <rect x="205.1" y="140.2" width="21.5" height="15" rx="5" fill="#f5c518"/>
  <rect x="231.8" y="138.2" width="21.5" height="15" rx="5" fill="#f5c518"/>
  <rect x="258.6" y="138.2" width="21.5" height="15" rx="5" fill="#f5c518"/>
  <rect x="285.4" y="140.2" width="21.5" height="15" rx="5" fill="#ff8c1a"/>
  <rect x="312.2" y="143.9" width="21.5" height="15" rx="5" fill="#ff8c1a"/>
  <rect x="339.1" y="148.9" width="21.5" height="15" rx="5" fill="#ff3b30"/>
  <rect x="365.9" y="154.9" width="21.5" height="15" rx="5" fill="#ff3b30"/>
</svg>
