name: Publish release packages

# Fires when you publish a GitHub Release (e.g. `gh release create vX.Y.Z ...`).
# The version is taken from the tag (vX.Y.Z -> X.Y.Z) and stamped into each
# packaging recipe at build time, so nothing in the repo needs bumping by hand.
#
# Channels:
#   * Debian/Ubuntu .deb  -> built here, attached to the release (no secret)
#   * Fedora COPR akmod   -> SRPM submitted to copr (needs secret COPR_CONFIG)
#   * openSUSE OBS RPM    -> committed to home:mescon (needs secret OSC_CONFIG)
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   COPR_CONFIG  the contents of your ~/.config/copr
#   OSC_CONFIG   the contents of your ~/.config/osc/oscrc

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)publish, e.g. v0.12.1"
        required: true

env:
  # tag name for either trigger; strip the leading v for the bare version
  TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}

jobs:
  # Gate every publish job on a well-formed version tag. TAG comes from a
  # maintainer-published release or a manual dispatch (both require write
  # access), but validating it here means a malformed ref never reaches a
  # checkout `ref:` or a secret-bearing job.
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - name: Check tag looks like vX.Y.Z
        run: |
          set -eu
          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*) echo "publishing for tag: $TAG" ;;
            *) echo "refusing to publish for unexpected tag: '$TAG'" >&2; exit 1 ;;
          esac

  debian:
    name: Debian/Ubuntu .deb
    needs: validate
    runs-on: ubuntu-latest
    # Only this job needs write access, to attach the .deb to the release.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential dpkg-dev debhelper dkms dh-dkms cargo \
            pkg-config libfontconfig-dev
      - name: Install a current Rust toolchain
        # Ubuntu's apt cargo is too old for the workspace (the lockfile
        # needs >= 1.88, the Slint GUI >= 1.92). Keep the apt cargo so
        # dpkg-checkbuilddeps stays satisfied, but build with rustup's
        # stable: ~/.cargo/bin is prepended to PATH so it wins over
        # /usr/bin for every following step.
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Stamp version from the tag
        run: |
          set -eu
          VERSION="${TAG#v}"
          {
            echo "logitech-trueforce-dkms (${VERSION}-1) unstable; urgency=medium"
            echo
            echo "  * Release ${VERSION}."
            echo
            echo " -- mescon <5875228+mescon@users.noreply.github.com>  $(date -R)"
          } > packaging/debian/changelog
      - name: Build the .deb
        run: packaging/debian/build-deb.sh "$PWD/out"
      - name: Attach the .deb to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" out/*.deb --clobber

  copr:
    name: Fedora COPR (akmod)
    needs: validate
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0
      - name: Install tools
        run: dnf install -y --setopt=install_weak_deps=False rpm-build kmodtool kernel-rpm-macros git make copr-cli
      - name: Configure copr-cli
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          mkdir -p ~/.config
          printf '%s' "$COPR_CONFIG" > ~/.config/copr
          chmod 600 ~/.config/copr
      - name: Build akmod SRPM (version from tag) and submit to COPR
        run: |
          set -eu
          VERSION="${TAG#v}"
          git config --global --add safe.directory '*'
          # Stamp the version so the SRPM (and the akmod COPR rebuilds from it)
          # carries the release version.
          sed -i "s/^%global\\( *\\)upstream_ver.*/%global\\1upstream_ver    ${VERSION}/" \
            packaging/akmods/logitech-trueforce-kmod.spec
          # Build the SRPM directly (git-free). The .copr/Makefile uses
          # `git archive`, which fails inside this container job (git
          # refuses repo discovery across the checkout mount boundary);
          # since the tag is already checked out, tar the working tree
          # instead. COPR's own "make srpm" build method still uses the
          # Makefile's git path on COPR's proper git clone.
          dnf install -y --setopt=install_weak_deps=False rpm-build tar
          PREFIX="logitech-trueforce-linux-driver-${VERSION}"
          SRCDIR="$HOME/rpmbuild/SOURCES"; mkdir -p "$SRCDIR" "$PWD/srpm"
          stage="$(mktemp -d)"; mkdir -p "$stage/$PREFIX"
          tar --exclude=./.git --exclude=./srpm --exclude=./out -cf - . \
            | tar -xf - -C "$stage/$PREFIX"
          tar -czf "$SRCDIR/logitech-trueforce-kmod-${VERSION}.tar.gz" \
            -C "$stage" "$PREFIX"
          rpmbuild -bs packaging/akmods/logitech-trueforce-kmod.spec \
            --define "_sourcedir $SRCDIR" --define "_srcrpmdir $PWD/srpm"
          # --enable-net on: the spec builds the userspace tools with cargo,
          # which fetches crate dependencies over the network (nothing vendored).
          copr-cli build --enable-net on mescon/logitech-trueforce srpm/*.src.rpm

  obs:
    name: openSUSE OBS
    needs: validate
    runs-on: ubuntu-latest
    container: opensuse/tumbleweed:latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0
      # Second checkout: the packaging recipes from the ref this workflow
      # run belongs to (the tag itself on release events, the dispatched
      # branch on workflow_dispatch). Sources always come from the tag,
      # but taking the spec/_service from here lets a manual dispatch
      # re-publish a release with packaging fixes made after the tag,
      # without re-tagging.
      - uses: actions/checkout@v4
        with:
          path: packaging-ref
      - name: Install tools
        # cargo + zstd: the spec builds the Rust workspace offline (OBS
        # builders have no network), so this job vendors the crate
        # dependencies into a zstd tarball shipped as Source1.
        run: zypper --non-interactive --gpg-auto-import-keys install -y osc git tar gzip sed cargo zstd
      - name: Configure osc
        env:
          OSC_CONFIG: ${{ secrets.OSC_CONFIG }}
        run: |
          mkdir -p ~/.config/osc
          printf '%s' "$OSC_CONFIG" > ~/.config/osc/oscrc
          chmod 600 ~/.config/osc/oscrc
      - name: Stamp version, generate tarball, commit to OBS
        run: |
          set -eu
          VERSION="${TAG#v}"
          git config --global --add safe.directory '*'
          sed -i "s/^%global\\( *\\)modver.*/%global\\1modver   ${VERSION}/" \
            packaging-ref/packaging/obs/logitech-trueforce-dkms.spec
          sed -i "s/^Version:.*/Version:        ${VERSION}/" \
            packaging-ref/packaging/obs/logitech-trueforce-dkms.spec
          sed -i "s#<param name=\"revision\">[^<]*</param>#<param name=\"revision\">${TAG}</param>#" \
            packaging-ref/packaging/obs/_service
          sed -i "s#<param name=\"version\">[^<]*</param>#<param name=\"version\">${VERSION}</param>#" \
            packaging-ref/packaging/obs/_service
          # git-free tarball: `git archive` fails in this container job
          # (git refuses repo discovery across the checkout mount
          # boundary), and the tag is already checked out, so tar the
          # working tree with the versioned prefix directory.
          PREFIX="logitech-trueforce-linux-driver-${VERSION}"
          stage="$(mktemp -d)"; mkdir -p "$stage/$PREFIX"
          tar --exclude=./.git --exclude=./srpm --exclude=./out \
            --exclude=./packaging-ref -cf - . \
            | tar -xf - -C "$stage/$PREFIX"
          tar -czf "/tmp/${PREFIX}.tar.gz" -C "$stage" "$PREFIX"
          # Vendor the Rust workspace's crate dependencies (Source1). OBS
          # builders have no network access, so `cargo build` in the spec
          # cannot resolve index.crates.io; the spec extracts this tarball
          # and builds --offline against it instead.
          vendorstage="$(mktemp -d)"
          cargo vendor --locked \
            --manifest-path userspace/logi-dd/Cargo.toml \
            "$vendorstage/vendor"
          tar --zstd -cf "/tmp/logi-dd-vendor-${VERSION}.tar.zst" \
            -C "$vendorstage" vendor
          work="$(mktemp -d)"; cd "$work"
          osc checkout home:mescon logitech-trueforce-dkms
          cd home:mescon/logitech-trueforce-dkms
          rm -f logitech-trueforce-linux-driver-*.tar.gz logi-dd-vendor-*.tar.zst
          cp "$GITHUB_WORKSPACE/packaging-ref/packaging/obs/logitech-trueforce-dkms.spec" .
          cp "$GITHUB_WORKSPACE/packaging-ref/packaging/obs/_service" .
          cp "/tmp/logitech-trueforce-linux-driver-${VERSION}.tar.gz" .
          cp "/tmp/logi-dd-vendor-${VERSION}.tar.zst" .
          osc addremove
          osc commit -m "logitech-trueforce-dkms ${VERSION} (from tag ${TAG})"
